<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P4 Low Priority Ticket - CRM System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="question-container">
            <div id="timer" class="timer">2:00</div>
            
            <div class="question-content">
                <h2>📝 P4 - Low Priority Ticket</h2>
                <div class="question-text" id="questionText">
                    LOW PRIORITY: Users would like better tooltips and help text throughout the application. How would you improve the user experience?
                </div>
                
                <form id="ticketForm">
                    <div class="answer-area">
                        <label for="answer"><strong>Your Response:</strong></label>
                        <textarea id="answer" placeholder="Describe your plan for addressing this low priority enhancement..." required></textarea>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" id="submitBtn" class="btn btn-submit">Submit Answer</button>
                        <button type="button" onclick="location.href='index.html'" class="btn btn-back">Back to Dashboard</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('questionText').textContent = getRandomQuestion('p4');
        initializeQuestionPage(120, 'P4');
    </script>
</body>
</html>
