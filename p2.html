<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2 High Priority Ticket - CRM System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="question-container">
            <div id="timer" class="timer">1:00</div>
            
            <div class="question-content">
                <h2>⚡ P2 - High Priority Ticket</h2>
                <div class="question-text" id="questionText">
                    HIGH PRIORITY: The website is loading very slowly (30+ seconds) and customers are complaining. Performance has degraded significantly since yesterday. What would you investigate first?
                </div>
                
                <form id="ticketForm">
                    <div class="answer-area">
                        <label for="answer"><strong>Your Response:</strong></label>
                        <textarea id="answer" placeholder="Describe your troubleshooting approach for this high priority issue..." required></textarea>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" id="submitBtn" class="btn btn-submit">Submit Answer</button>
                        <button type="button" onclick="location.href='index.html'" class="btn btn-back">Back to Dashboard</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('questionText').textContent = getRandomQuestion('p2');
        initializeQuestionPage(60, 'P2');
    </script>
</body>
</html>
