<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 Critical Ticket - CRM System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="question-container">
            <div id="timer" class="timer">0:30</div>
            
            <div class="question-content">
                <h2>🚨 P1 - Critical Priority Ticket</h2>
                
                <div class="question-text" id="questionText">
                    Loading question...
                </div>
                
                <form id="ticketForm">
                    <div class="answer-options" id="answerOptions">
                        <!-- Options will be loaded dynamically -->
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" id="submitBtn" class="btn btn-submit">Submit Answer</button>
                        <button type="button" onclick="location.href='index.html'" class="btn btn-back">Back to Dashboard</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="success-modal">
        <div class="success-modal-content">
            <div class="success-header">🎉</div>
            <div class="success-title">Congratulations!</div>
            <div class="success-message">
                You've successfully resolved this ticket! Your quick thinking and expertise make you a valuable team member.
            </div>
            
            <div class="success-actions">
                <h3>What would you like to do next?</h3>
                <div class="success-action-buttons">
                    <button onclick="openTicketModal('feature')" class="success-action-btn feature">
                        🚀 Feature Request
                    </button>
                    <button onclick="openTicketModal('bug')" class="success-action-btn bug">
                        🐛 Bug Report
                    </button>
                    <button onclick="openTicketModal('sre')" class="success-action-btn sre">
                        ⚙️ SRE Ticket
                    </button>
                </div>
                <button onclick="closeSuccessModal()" class="success-close-btn">
                    Continue
                </button>
            </div>
        </div>
    </div>

    <!-- Regular Modal for ticket creation -->
    <div id="ticketModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeTicketModal()">&times;</span>
            <h2 id="modalTitle">Create Ticket</h2>
            <form id="ticketCreationForm">
                <div class="form-group">
                    <label for="ticketTitle">Title:</label>
                    <input type="text" id="ticketTitle" required>
                </div>
                <div class="form-group">
                    <label for="ticketDescription">Description:</label>
                    <textarea id="ticketDescription" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="ticketPriority">Priority:</label>
                    <select id="ticketPriority" required>
                        <option value="">Select Priority</option>
                        <option value="P1">P1 - Critical</option>
                        <option value="P2">P2 - High</option>
                        <option value="P3">P3 - Medium</option>
                        <option value="P4">P4 - Low</option>
                    </select>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-submit">Create Ticket</button>
                    <button type="button" onclick="closeTicketModal()" class="btn btn-back">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            loadQuestion('p1');
            initializeQuestionPage(30, 'P1');
        });

        // Modal functions
        function openTicketModal(type) {
            // Close success modal first
            const successModal = document.getElementById('successModal');
            if (successModal) {
                successModal.style.display = 'none';
            }
            
            const modal = document.getElementById('ticketModal');
            const title = document.getElementById('modalTitle');
            
            const titles = {
                feature: '🚀 Create Feature Request',
                bug: '🐛 Report Bug',
                sre: '⚙️ Create SRE Ticket'
            };
            
            title.textContent = titles[type];
            modal.style.display = 'block';
            
            document.getElementById('ticketCreationForm').dataset.ticketType = type;
        }

        function closeTicketModal() {
            document.getElementById('ticketModal').style.display = 'none';
            document.getElementById('ticketCreationForm').reset();
        }

        // Handle ticket creation form
        document.getElementById('ticketCreationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const type = this.dataset.ticketType;
            const title = document.getElementById('ticketTitle').value;
            const description = document.getElementById('ticketDescription').value;
            const priority = document.getElementById('ticketPriority').value;
            
            const ticketId = 'TKT-' + Date.now().toString().slice(-6);
            alert(`✅ ${type.toUpperCase()} ticket created successfully!

` +
                  `Ticket ID: ${ticketId}
` +
                  `Title: ${title}
` +
                  `Priority: ${priority}
` +
                  `Description: ${description}

` +
                  `Your ticket has been submitted to the appropriate team.`);
            closeTicketModal();
            
            // Show back to dashboard after creating ticket
            showBackToDashboard();
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('ticketModal');
            const successModal = document.getElementById('successModal');
            
            if (event.target == modal) {
                closeTicketModal();
            }
            if (event.target == successModal) {
                closeSuccessModal();
            }
        }
    </script>
</body>
</html>
